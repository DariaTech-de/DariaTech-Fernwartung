name: Flutter Nightly Build

on:
  # DariaTech: naechtlicher Auto-Build deaktiviert (spart Actions-Minuten).
  # Fuer On-Demand-Builds den Workflow "DariaTech Release Build" verwenden
  # (daria-release.yml) oder hier manuell ausloesen.
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
